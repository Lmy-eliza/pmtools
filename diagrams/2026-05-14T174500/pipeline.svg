<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景装饰 -->
  <rect width="1200" height="500" fill="#f8fafc" rx="16"/>
  <circle cx="60" cy="60" r="120" fill="#ede9fe" opacity="0.3"/>
  <circle cx="1140" cy="440" r="100" fill="#dbeafe" opacity="0.3"/>

  <!-- 标题 -->
  <text x="600" y="55" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e293b">smart-planner 产品链路</text>
  <text x="600" y="82" text-anchor="middle" font-size="14" fill="#94a3b8">知识驱动的整车项目计划智能助手</text>

  <!-- Step 1 -->
  <g transform="translate(60, 120)" filter="url(#shadow)">
    <rect width="230" height="280" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="230" height="8" rx="4" fill="url(#g1)" y="0"/>
    <circle cx="115" cy="60" r="28" fill="#ede9fe"/>
    <text x="115" y="66" text-anchor="middle" font-size="24">📥</text>
    <text x="115" y="105" text-anchor="middle" font-size="18" font-weight="bold" fill="#4338ca">Step 1</text>
    <text x="115" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">知识沉淀</text>
    <line x1="40" y1="148" x2="190" y2="148" stroke="#e2e8f0" stroke-width="1"/>
    <text x="115" y="175" text-anchor="middle" font-size="13" fill="#64748b">历史项目计划</text>
    <text x="115" y="198" text-anchor="middle" font-size="13" fill="#64748b">画板 → 结构化数据</text>
    <text x="115" y="221" text-anchor="middle" font-size="13" fill="#64748b">WBS数据录入</text>
    <rect x="40" y="245" width="150" height="24" rx="12" fill="#ede9fe"/>
    <text x="115" y="262" text-anchor="middle" font-size="11" fill="#6366f1">Excel导入解析</text>
  </g>

  <!-- 箭头 1→2 -->
  <g transform="translate(295, 260)">
    <polyline points="0,0 40,0" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <polygon points="38,-6 50,0 38,6" fill="#a78bfa"/>
  </g>

  <!-- Step 2 -->
  <g transform="translate(350, 120)" filter="url(#shadow)">
    <rect width="230" height="280" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="230" height="8" rx="4" fill="url(#g2)" y="0"/>
    <circle cx="115" cy="60" r="28" fill="#dbeafe"/>
    <text x="115" y="66" text-anchor="middle" font-size="24">📐</text>
    <text x="115" y="105" text-anchor="middle" font-size="18" font-weight="bold" fill="#2563eb">Step 2</text>
    <text x="115" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">标准模板</text>
    <line x1="40" y1="148" x2="190" y2="148" stroke="#e2e8f0" stroke-width="1"/>
    <text x="115" y="175" text-anchor="middle" font-size="13" fill="#64748b">分车型制定标准</text>
    <text x="115" y="198" text-anchor="middle" font-size="13" fill="#64748b">全新 / 改款 / 海外</text>
    <text x="115" y="221" text-anchor="middle" font-size="13" fill="#64748b">阀点自动排布</text>
    <rect x="40" y="245" width="150" height="24" rx="12" fill="#dbeafe"/>
    <text x="115" y="262" text-anchor="middle" font-size="11" fill="#2563eb">G5→G4→G3→G2→G1→G0</text>
  </g>

  <!-- 箭头 2→3 -->
  <g transform="translate(585, 260)">
    <polyline points="0,0 40,0" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
    <polygon points="38,-6 50,0 38,6" fill="#22d3ee"/>
  </g>

  <!-- Step 3 -->
  <g transform="translate(640, 120)" filter="url(#shadow)">
    <rect width="230" height="280" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="230" height="8" rx="4" fill="url(#g3)" y="0"/>
    <circle cx="115" cy="60" r="28" fill="#d1fae5"/>
    <text x="115" y="66" text-anchor="middle" font-size="24">🤖</text>
    <text x="115" y="105" text-anchor="middle" font-size="18" font-weight="bold" fill="#059669">Step 3</text>
    <text x="115" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">计划生成</text>
    <line x1="40" y1="148" x2="190" y2="148" stroke="#e2e8f0" stroke-width="1"/>
    <text x="115" y="175" text-anchor="middle" font-size="13" fill="#64748b">输入SOP日期</text>
    <text x="115" y="198" text-anchor="middle" font-size="13" fill="#64748b">自动倒排生成建议版</text>
    <text x="115" y="221" text-anchor="middle" font-size="13" fill="#64748b">阀点+节点自动排期</text>
    <rect x="40" y="245" width="150" height="24" rx="12" fill="#d1fae5"/>
    <text x="115" y="262" text-anchor="middle" font-size="11" fill="#059669">AI对话式交互</text>
  </g>

  <!-- 箭头 3→4 -->
  <g transform="translate(875, 260)">
    <polyline points="0,0 40,0" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <polygon points="38,-6 50,0 38,6" fill="#fbbf24"/>
  </g>

  <!-- Step 4 -->
  <g transform="translate(920, 120)" filter="url(#shadow)">
    <rect width="230" height="280" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="230" height="8" rx="4" fill="url(#g4)" y="0"/>
    <circle cx="115" cy="60" r="28" fill="#fef3c7"/>
    <text x="115" y="66" text-anchor="middle" font-size="24">⚠️</text>
    <text x="115" y="105" text-anchor="middle" font-size="18" font-weight="bold" fill="#d97706">Step 4</text>
    <text x="115" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">风险识别</text>
    <line x1="40" y1="148" x2="190" y2="148" stroke="#e2e8f0" stroke-width="1"/>
    <text x="115" y="175" text-anchor="middle" font-size="13" fill="#64748b">计划调整后</text>
    <text x="115" y="198" text-anchor="middle" font-size="13" fill="#64748b">AI识别风险</text>
    <text x="115" y="221" text-anchor="middle" font-size="13" fill="#64748b">级联影响分析</text>
    <rect x="40" y="245" width="150" height="24" rx="12" fill="#fef3c7"/>
    <text x="115" y="262" text-anchor="middle" font-size="11" fill="#d97706">措施建议输出</text>
  </g>

  <!-- 底部标注 -->
  <text x="600" y="465" text-anchor="middle" font-size="13" fill="#94a3b8">立项前：Step 1-3（知识积累+计划生成）  |  立项后：Step 4（风险监控+措施建议）</text>
</svg>
