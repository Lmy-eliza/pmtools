<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600">
  <defs>
    <linearGradient id="a1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="a2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="a3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="1" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1100" height="600" fill="#f1f5f9" rx="16"/>

  <!-- 标题 -->
  <text x="550" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a">smart-planner 技术架构</text>
  <text x="550" y="65" text-anchor="middle" font-size="13" fill="#94a3b8">Skill + Web 双层协作，可退化为纯 Web</text>

  <!-- 第一层：用户交互层 -->
  <rect x="40" y="85" width="1020" height="210" rx="14" fill="white" stroke="#c7d2fe" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="40" y="85" width="1020" height="36" rx="14" fill="url(#a1)"/>
  <rect x="40" y="107" width="1020" height="14" fill="url(#a1)"/>
  <text x="550" y="109" text-anchor="middle" font-size="15" font-weight="bold" fill="white">用户交互层</text>

  <!-- 飞书 Skill -->
  <g transform="translate(75, 140)">
    <rect width="200" height="135" rx="12" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
    <text x="100" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#4338ca">飞书 Skill/Agent</text>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#c7d2fe"/>
    <text x="100" y="62" text-anchor="middle" font-size="12" fill="#64748b">对话式输入</text>
    <text x="100" y="82" text-anchor="middle" font-size="12" fill="#64748b">"生成全新车型计划</text>
    <text x="100" y="102" text-anchor="middle" font-size="12" fill="#64748b">SOP 2028-06"</text>
    <rect x="30" y="112" width="140" height="18" rx="9" fill="#c7d2fe"/>
    <text x="100" y="125" text-anchor="middle" font-size="10" fill="#4338ca">可选（退化时跳过）</text>
  </g>

  <!-- 箭头 Skill → Web -->
  <g transform="translate(285, 205)">
    <polyline points="0,0 50,0" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="48,-5 58,0 48,5" fill="#6366f1"/>
    <text x="29" y="-8" text-anchor="middle" font-size="10" fill="#6366f1">生成</text>
  </g>

  <!-- Web 应用 -->
  <g transform="translate(350, 140)">
    <rect width="400" height="135" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
    <text x="200" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1d4ed8">Web 应用（可视化+精调）</text>
    <line x1="20" y1="40" x2="380" y2="40" stroke="#bfdbfe"/>
    <text x="100" y="65" text-anchor="middle" font-size="12" fill="#475569">甘特图/时间线</text>
    <text x="100" y="85" text-anchor="middle" font-size="12" fill="#475569">节点编辑</text>
    <text x="300" y="65" text-anchor="middle" font-size="12" fill="#475569">级联影响分析</text>
    <text x="300" y="85" text-anchor="middle" font-size="12" fill="#475569">风险仪表盘</text>
    <rect x="80" y="100" width="240" height="22" rx="11" fill="#dbeafe"/>
    <text x="200" y="115" text-anchor="middle" font-size="11" fill="#2563eb">React + TypeScript + Ant Design + ECharts</text>
  </g>

  <!-- 箭头 Web → 飞书文档 -->
  <g transform="translate(760, 205)">
    <polyline points="0,0 50,0" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="48,-5 58,0 48,5" fill="#3b82f6"/>
    <text x="29" y="-8" text-anchor="middle" font-size="10" fill="#3b82f6">确认</text>
  </g>

  <!-- 飞书文档输出 -->
  <g transform="translate(825, 140)">
    <rect width="200" height="135" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="100" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d">飞书文档输出</text>
    <line x1="20" y1="40" x2="180" y2="40" stroke="#bbf7d0"/>
    <text x="100" y="65" text-anchor="middle" font-size="12" fill="#475569">画板呈现</text>
    <text x="100" y="85" text-anchor="middle" font-size="12" fill="#475569">项目计划可视化</text>
    <text x="100" y="105" text-anchor="middle" font-size="12" fill="#475569">Excel导出</text>
    <rect x="30" y="112" width="140" height="18" rx="9" fill="#bbf7d0"/>
    <text x="100" y="125" text-anchor="middle" font-size="10" fill="#15803d">lark-cli whiteboard</text>
  </g>

  <!-- 第二层：共享核心引擎 -->
  <rect x="40" y="315" width="1020" height="130" rx="14" fill="white" stroke="#a7f3d0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="40" y="315" width="1020" height="36" rx="14" fill="url(#a3)"/>
  <rect x="40" y="337" width="1020" height="14" fill="url(#a3)"/>
  <text x="550" y="339" text-anchor="middle" font-size="15" font-weight="bold" fill="white">共享核心引擎</text>

  <!-- 引擎模块 -->
  <g transform="translate(75, 370)">
    <rect width="140" height="55" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">WBS数据模型</text>
    <text x="70" y="43" text-anchor="middle" font-size="10" fill="#64748b">三级结构解析</text>
  </g>
  <g transform="translate(235, 370)">
    <rect width="140" height="55" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">日期倒排引擎</text>
    <text x="70" y="43" text-anchor="middle" font-size="10" fill="#64748b">顺延+节假日</text>
  </g>
  <g transform="translate(395, 370)">
    <rect width="140" height="55" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">级联重算</text>
    <text x="70" y="43" text-anchor="middle" font-size="10" fill="#64748b">下游联动计算</text>
  </g>
  <g transform="translate(555, 370)">
    <rect width="140" height="55" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">AI Prompt模板</text>
    <text x="70" y="43" text-anchor="middle" font-size="10" fill="#64748b">风险识别规则</text>
  </g>
  <g transform="translate(715, 370)">
    <rect width="140" height="55" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">Excel解析</text>
    <text x="70" y="43" text-anchor="middle" font-size="10" fill="#64748b">SheetJS (xlsx)</text>
  </g>
  <g transform="translate(875, 370)">
    <rect width="155" height="55" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
    <text x="77" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">健康度评分</text>
    <text x="77" y="43" text-anchor="middle" font-size="10" fill="#64748b">多维度综合计算</text>
  </g>

  <!-- 第三层：数据与部署 -->
  <rect x="40" y="465" width="1020" height="110" rx="14" fill="white" stroke="#fde68a" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="40" y="465" width="1020" height="36" rx="14" fill="#f59e0b"/>
  <rect x="40" y="487" width="1020" height="14" fill="#f59e0b"/>
  <text x="550" y="489" text-anchor="middle" font-size="15" font-weight="bold" fill="white">数据层 + 部署</text>

  <g transform="translate(75, 515)">
    <rect width="200" height="40" rx="10" fill="#fef9c3" stroke="#fcd34d" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" font-size="12" fill="#92400e">localStorage + JSON</text>
  </g>
  <g transform="translate(310, 515)">
    <rect width="200" height="40" rx="10" fill="#fef9c3" stroke="#fcd34d" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" font-size="12" fill="#92400e">Excel 导入/导出</text>
  </g>
  <g transform="translate(545, 515)">
    <rect width="200" height="40" rx="10" fill="#fef9c3" stroke="#fcd34d" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" font-size="12" fill="#92400e">阿里云百炼 / Claude API</text>
  </g>
  <g transform="translate(780, 515)">
    <rect width="245" height="40" rx="10" fill="#fef9c3" stroke="#fcd34d" stroke-width="1"/>
    <text x="122" y="25" text-anchor="middle" font-size="12" fill="#92400e">Netlify 部署</text>
  </g>
</svg>
