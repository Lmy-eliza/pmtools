[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Redirect /api/feishu/* to the feishu Netlify Function
[[redirects]]
  from = "/api/feishu/*"
  to = "/.netlify/functions/feishu"
  status = 200

# SPA fallback: all other routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
